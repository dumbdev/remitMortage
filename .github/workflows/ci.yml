name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ── Smart Contracts CI ──────────────────────────────────────────────────
  contracts-ci:
    name: Contracts CI (Soroban)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy, rustfmt

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            contracts -> target

      - name: Check Formatting
        run: cargo fmt --all -- --check
        working-directory: contracts

      - name: Lint with Clippy
        run: cargo clippy --all-targets -- -D warnings
        working-directory: contracts

      - name: Run Unit Tests
        run: cargo test
        working-directory: contracts

  # ── Backend CI ──────────────────────────────────────────────────────────
  backend-ci:
    name: Backend CI (Express & TS)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install Dependencies
        run: npm ci
        working-directory: backend

      - name: TypeScript Type Check
        run: npx tsc --noEmit
        working-directory: backend

  # ── Frontend CI ─────────────────────────────────────────────────────────
  frontend-ci:
    name: Frontend CI (Next.js)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci
        working-directory: frontend

      - name: Build Next.js Application
        run: npm run build
        working-directory: frontend
        env:
          # Prevent build from failing due to missing env variables in CI
          NEXT_PUBLIC_ESCROW_CONTRACT_ID: CAWXDSZM52E5BW7G6TFX7DTXSHF7F75TUSSWW7B442NBEU3CADXNVTXH
          NEXT_PUBLIC_LENDING_POOL_CONTRACT_ID: CBIELTK6YBZJU5UP2WWQEUCYKLPU6AUNZ2BQ4WWFEIE3USCIHMXQDAMA
          NEXT_PUBLIC_USDC_TOKEN_ID: CCERWUE35WN7M4PN6XYK7CDCJZX35TC53TFATJNBRA6I3FDS3RVS65YF
          NEXT_PUBLIC_NETWORK_PASSPHRASE: "Test SDF Network ; September 2015"
          NEXT_PUBLIC_HORIZON_URL: "https://horizon-testnet.stellar.org"
